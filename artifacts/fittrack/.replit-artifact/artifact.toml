kind = "web"
previewPath = "/"
title = "FitTrack"
version = "1.0.0"
id = "artifacts/fittrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22216

[services.development]
run = "pnpm --filter @workspace/fittrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fittrack", "run", "build" ]
publicDir = "artifacts/fittrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22216"
BASE_PATH = "/"
